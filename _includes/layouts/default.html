---
layout: base
---
  <!-- Page Title -->
  {% if title %}
  <div id="page-title" class="sixteen columns">
    <h1>{{ title }}</h1>
  </div>
  {% endif %}

  <!-- Content -->
    <div class="twelve columns">
    {{ content }}
  </div>

    {% endfor %}

{% if images %}
  <aside class="four columns">
    {% for image in images %}
      {% assign image_parts = image | size %}
      {% if image_parts == 2 %}
        <a class="thumb" rel="images" href="/media/{{ image[0] }}" title="{{ image[1] }}"><img src="/media/{{ image[0] }}" alt="{{ image[1] }}"></a>
		<div class="caption">{{ image[1] }}</div>
      {% else %}
        <a class="thumb" rel="images" href="/media/{{ image }}"><img src="/media/{{ image }}" alt="{{ title }}"></a>      
      {% endif %}
    {% endfor %}
  </aside>
  {% endif %}
